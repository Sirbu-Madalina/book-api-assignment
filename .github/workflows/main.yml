name: Backend CI/CD

on:
  push:
    branches: [main, de-exam]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: book-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: book-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Run Playwright API tests
        run: npm test
        env:
          NODE_ENV: test
          DBHOST: ${{ secrets.DBHOST }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: 4000